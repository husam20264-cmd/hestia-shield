# ============================================================
# Hestia Shield v1.1.0 - Production Docker Compose
# Services: API + PostgreSQL + Redis + OTEL Collector
# ============================================================

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---- Hestia Shield API ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hestiashield/hestia-shield:1.1.0
    container_name: hestia-api
    restart: unless-stopped
    ports:
      - "${HESTIA_PORT:-8000}:8000"
    environment:
      HESTIA_DATABASE_URL: "postgresql+asyncpg://${DB_USER:-hestia}:${DB_PASSWORD:-hestia}@postgres:5432/${DB_NAME:-hestia}"
      HESTIA_REDIS_URL: "redis://redis:6379/0"
      HESTIA_JWT_SECRET: "${HESTIA_JWT_SECRET:-change-me-in-production}"
      HESTIA_DATA_DIR: "/app/data"
      HESTIA_LOG_LEVEL: "${HESTIA_LOG_LEVEL:-INFO}"
      HESTIA_OTEL_ENABLED: "${HESTIA_OTEL_ENABLED:-true}"
      HESTIA_OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      HESTIA_OTEL_SERVICE_NAME: "hestia-shield"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - hestia_data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---- PostgreSQL ----
  postgres:
    image: postgres:15-alpine
    container_name: hestia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME:-hestia}"
      POSTGRES_USER: "${DB_USER:-hestia}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-hestia}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hestia} -d ${DB_NAME:-hestia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: hestia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ---- OpenTelemetry Collector ----
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: hestia-otel
    restart: unless-stopped
    command:
      - "--config=/etc/otel-collector-config.yaml"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  hestia_data:
    driver: local

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hestia-shield
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hestia-shield
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hestia-shield
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hestia-shield
          image: hestiashield/hestia-shield:1.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: hestia-shield-config
            - secretRef:
                name: hestia-shield-secret
                optional: true
          env:
            - name: HESTIA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hestia-shield-secret
                  key: HESTIA_JWT_SECRET
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}

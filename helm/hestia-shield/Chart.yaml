apiVersion: v2
name: hestia-shield
description: Runtime Security for AI Agents
type: application
version: 1.1.0
appVersion: "1.1.0"
icon: https://raw.githubusercontent.com/hestia-shield/hestia/main/logo.png

keywords:
  - security
  - ai
  - llm
  - guardrails
  - runtime-protection

home: https://github.com/hestia-shield/hestia
sources:
  - https://github.com/hestia-shield/hestia

maintainers:
  - name: Hestia Team
    email: team@hestia-shield.com

dependencies:
  - name: postgresql
    version: "~15.5.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
    alias: postgresql
  - name: redis
    version: "~19.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
    alias: redis

annotations:
  artifacthub.io/changes: |
    - kind: added
      description: Initial Helm chart for Hestia Shield v1.1.0
  artifacthub.io/category: security
